[build]
  base = "CascadeProjects/windsurf-project-5"
  publish = "CascadeProjects/windsurf-project-5/public"
  functions = "CascadeProjects/windsurf-project-5/netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm start"
  port = 3000
  publish = "public"
  autoLaunch = true
