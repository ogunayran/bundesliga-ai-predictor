<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Dynamic Pricing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1e1e30 0%, #2a2a40 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2em;
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        .nav-link:hover {
            background: linear-gradient(135deg, #ffed4e 0%, #ffd700 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.5);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chart-title {
            font-size: 1.3em;
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            font-weight: 700;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(255,215,0,0.3);
            border-color: rgba(255,215,0,0.4);
        }

        .stat-label {
            color: #9999b3;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #ffd700;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }

        .export-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4ecca3 0%, #36d1a0 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(78,204,163,0.3);
        }

        .export-btn:hover {
            background: linear-gradient(135deg, #36d1a0 0%, #4ecca3 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78,204,163,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30,30,48,0.6);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #e0e0e0;
        }

        th {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            color: #ffd700;
            font-weight: 700;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }

        tr:hover {
            background: rgba(255,215,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 Ana Sayfa</a>
                <button class="export-btn" onclick="exportToCSV()">📥 Excel'e Aktar</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Toplam Ürün</div>
                <div class="stat-value" id="totalProducts">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Ortalama Fiyat</div>
                <div class="stat-value" id="avgPrice">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">En Yüksek Talep</div>
                <div class="stat-value" id="maxDemand">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Düşük Stok</div>
                <div class="stat-value" id="lowStock">-</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-card">
                <h2 class="chart-title">📈 Kategori Performansı</h2>
                <canvas id="categoryChart"></canvas>
            </div>

            <div class="chart-card">
                <h2 class="chart-title">⏰ Saatlik Fiyat Değişimi</h2>
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h2 class="chart-title">🏆 En Yüksek Talep Gören Ürünler</h2>
            <table id="topProductsTable">
                <thead>
                    <tr>
                        <th>Ürün</th>
                        <th>Kategori</th>
                        <th>Fiyat</th>
                        <th>Talep Skoru</th>
                        <th>Rating</th>
                        <th>Stok</th>
                    </tr>
                </thead>
                <tbody id="topProductsBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? '/api' : '/.netlify/functions';

        async function loadAnalytics() {
            try {
                const [categoryPerf, hourlyStats, topProducts, generalStats] = await Promise.all([
                    fetch(`${API_BASE}/analytics/category-performance`).then(r => r.json()),
                    fetch(`${API_BASE}/analytics/hourly-stats`).then(r => r.json()),
                    fetch(`${API_BASE}/analytics/top-products?limit=10`).then(r => r.json()),
                    fetch(`${API_BASE}/pricing/analytics`).then(r => r.json())
                ]);

                if (generalStats.success) {
                    document.getElementById('totalProducts').textContent = generalStats.data.totalProducts;
                    document.getElementById('avgPrice').textContent = '$' + generalStats.data.averageCurrentPrice;
                    
                    const categories = Object.values(generalStats.data.byCategory);
                    const maxDemand = Math.max(...categories.map(c => parseFloat(c.avgPrice)));
                    document.getElementById('maxDemand').textContent = '$' + maxDemand.toFixed(2);
                    
                    const lowStockCount = categories.reduce((sum, c) => sum + (c.count < 20 ? 1 : 0), 0);
                    document.getElementById('lowStock').textContent = lowStockCount;
                }

                if (categoryPerf.success) {
                    createCategoryChart(categoryPerf.data);
                }

                if (hourlyStats.success) {
                    createHourlyChart(hourlyStats.data);
                }

                if (topProducts.success) {
                    displayTopProducts(topProducts.data);
                }

            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }

        function createCategoryChart(data) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            const sortedData = data.sort((a, b) => b.avg_demand - a.avg_demand).slice(0, 8);
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedData.map(d => d.category),
                    datasets: [{
                        label: 'Ortalama Talep',
                        data: sortedData.map(d => d.avg_demand),
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function createHourlyChart(data) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.hour + ':00'),
                    datasets: [{
                        label: 'Ortalama Fiyat ($)',
                        data: data.map(d => d.avg_price),
                        borderColor: 'rgba(118, 75, 162, 1)',
                        backgroundColor: 'rgba(118, 75, 162, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        function displayTopProducts(products) {
            const tbody = document.getElementById('topProductsBody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.title.substring(0, 50)}...</td>
                    <td>${p.category}</td>
                    <td>$${p.current_price.toFixed(2)}</td>
                    <td>${p.demand_score.toFixed(2)}</td>
                    <td>⭐ ${p.rating}/5</td>
                    <td>${p.stock_level}</td>
                </tr>
            `).join('');
        }

        async function exportToCSV() {
            try {
                const response = await fetch(`${API_BASE}/analytics/export/csv`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `products_${Date.now()}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                alert('✅ Excel dosyası indirildi!');
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        loadAnalytics();
    </script>
</body>
</html>
