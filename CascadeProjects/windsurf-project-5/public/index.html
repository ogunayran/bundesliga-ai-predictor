<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Dynamic Pricing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1e1e30 0%, #2a2a40 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #b8b8d1;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(255,215,0,0.3);
            border-color: rgba(255,215,0,0.4);
        }

        .stat-label {
            color: #9999b3;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #ffd700;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }

        .section {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            font-weight: 700;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, input, button {
            padding: 12px 20px;
            border: 2px solid rgba(255,215,0,0.2);
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            background: rgba(30,30,48,0.8);
            color: #e0e0e0;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        button {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            border: none;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #ffed4e 0%, #ffd700 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.5);
        }

        button:disabled {
            background: #3a3a50;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid rgba(255,215,0,0.2);
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
        }

        .product-title {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .product-category {
            color: #ffd700;
            font-size: 0.9em;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .price-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.5em;
            font-weight: bold;
            color: #4ecca3;
            text-shadow: 0 2px 10px rgba(78,204,163,0.3);
        }

        .price-change {
            font-size: 0.9em;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .price-up {
            background: rgba(220,53,69,0.2);
            color: #ff6b6b;
            border: 1px solid rgba(220,53,69,0.3);
        }

        .price-down {
            background: rgba(78,204,163,0.2);
            color: #4ecca3;
            border: 1px solid rgba(78,204,163,0.3);
        }

        .product-details {
            font-size: 0.9em;
            color: #9999b3;
            margin-top: 10px;
        }

        .rating {
            color: #ffc107;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9999b3;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .strategy-info {
            background: rgba(30,30,48,0.6);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .strategy-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .strategy-item {
            background: rgba(30,30,48,0.8);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffd700;
        }

        .strategy-name {
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .strategy-desc {
            font-size: 0.9em;
            color: #9999b3;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.5);
        }

        .quick-btn.danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        .quick-btn.success {
            background: linear-gradient(135deg, #4ecca3 0%, #36d1a0 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(78,204,163,0.3);
        }

        .time-display {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            color: #ffd700;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 10px;
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e30 100%);
            color: #e0e0e0;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1000;
            display: none;
            min-width: 300px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .notification.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 4px solid #4ecca3;
            box-shadow: 0 10px 40px rgba(78,204,163,0.3);
        }

        .notification.error {
            border-left: 4px solid #ff6b6b;
            box-shadow: 0 10px 40px rgba(255,107,107,0.3);
        }

        .factor-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.85em;
            margin: 2px;
            background: rgba(30,30,48,0.6);
            color: #9999b3;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .factor-positive {
            background: rgba(78,204,163,0.2);
            color: #4ecca3;
            border: 1px solid rgba(78,204,163,0.3);
        }

        .factor-negative {
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
    </style>
</head>
<body>
    <div id="notification" class="notification"></div>
    
    <div class="container">
        <div class="header">
            <div>
                <h1>🛒 Grocery Dynamic Pricing</h1>
                <p class="subtitle">Gerçek zamanlı dinamik fiyatlandırma sistemi</p>
            </div>
            <div style="text-align: right;">
                <a href="/analytics.html" style="display: inline-block; padding: 12px 25px; background: #28a745; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 10px; font-weight: 600;">📊 Analytics Dashboard</a>
                <div class="time-display" id="currentTime">⏰ Loading...</div>
            </div>
        </div>

        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-label">Toplam Ürün</div>
                <div class="stat-value" id="totalProducts">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ortalama Fiyat</div>
                <div class="stat-value" id="avgPrice">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Kategori Sayısı</div>
                <div class="stat-value" id="categoryCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Aktif Strateji</div>
                <div class="stat-value" id="activeStrategy">Combined</div>
            </div>
        </div>

        <div class="section">
            <h2>📈 Zamana Göre Fiyat Trendi</h2>
            <div style="margin-bottom: 15px;">
                <select id="trendProductSelect" style="margin-right: 10px;">
                    <option value="">Ürün seçin...</option>
                </select>
                <button onclick="loadPriceTrend()">Trend Göster</button>
            </div>
            <canvas id="priceTrendChart" style="max-height: 300px;"></canvas>
        </div>

        <div class="section">
            <h2>Fiyatlandırma Stratejileri</h2>
            <div class="strategy-info" id="strategies"></div>
        </div>

        <div class="section">
            <h2>Ürün Fiyatlandırma</h2>
            
            <div class="quick-actions">
                <button class="quick-btn" onclick="simulateScenario('peak')">🔥 Peak Hours Simülasyonu</button>
                <button class="quick-btn" onclick="simulateScenario('lowstock')">📦 Düşük Stok Simülasyonu</button>
                <button class="quick-btn success" onclick="simulateScenario('discount')">💰 Gece İndirimi</button>
                <button class="quick-btn danger" onclick="resetPrices()">🔄 Fiyatları Sıfırla</button>
            </div>
            
            <div class="controls">
                <select id="categoryFilter">
                    <option value="">Tüm Kategoriler</option>
                </select>
                <select id="strategySelect">
                    <option value="combined">Combined (Kombine)</option>
                    <option value="demand">Demand (Talep)</option>
                    <option value="time">Time (Zaman)</option>
                    <option value="inventory">Inventory (Stok)</option>
                    <option value="rating">Rating (Değerlendirme)</option>
                    <option value="competition">Competition (Rekabet)</option>
                </select>
                <input type="number" id="limitInput" placeholder="Limit (varsayılan: 20)" value="20" min="1" max="100">
                <button onclick="loadProducts()">Fiyatları Hesapla</button>
                <button onclick="updateAllPrices()">Tüm Fiyatları Güncelle</button>
            </div>
            <div id="products" class="loading">
                <div class="spinner"></div>
                <p>Ürünler yükleniyor...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? '/api' : '/.netlify/functions';

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = now.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('currentTime').innerHTML = `⏰ ${timeStr} | 📅 ${dateStr}`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type} show`;
            notification.innerHTML = `
                <strong>${type === 'success' ? '✅ Başarılı!' : '❌ Hata!'}</strong>
                <p style="margin: 10px 0 0 0;">${message}</p>
            `;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        let priceTrendChart = null;

        async function loadPriceTrend() {
            const productId = document.getElementById('trendProductSelect').value;
            if (!productId) {
                showNotification('Lütfen bir ürün seçin', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/products/${productId}`);
                const result = await response.json();
                
                if (!result.success) {
                    showNotification('Ürün bulunamadı', 'error');
                    return;
                }

                const product = result.data;
                const hours = Array.from({length: 24}, (_, i) => i);
                const prices = [];

                for (const hour of hours) {
                    const priceResponse = await fetch(`${API_BASE}/products/${productId}/price?strategy=time`);
                    const priceResult = await priceResponse.json();
                    
                    if (priceResult.success) {
                        prices.push(priceResult.data.pricing.price);
                    }
                }

                const ctx = document.getElementById('priceTrendChart').getContext('2d');
                
                if (priceTrendChart) {
                    priceTrendChart.destroy();
                }

                priceTrendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: hours.map(h => `${h}:00`),
                        datasets: [{
                            label: `${product.title.substring(0, 50)}... - Saatlik Fiyat`,
                            data: prices,
                            borderColor: '#ffd700',
                            backgroundColor: 'rgba(255, 215, 0, 0.1)',
                            tension: 0.4,
                            fill: true,
                            pointBackgroundColor: '#ffd700',
                            pointBorderColor: '#1a1a2e',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#e0e0e0',
                                    font: {
                                        size: 12,
                                        weight: 'bold'
                                    }
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(30, 30, 48, 0.9)',
                                titleColor: '#ffd700',
                                bodyColor: '#e0e0e0',
                                borderColor: '#ffd700',
                                borderWidth: 1
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                ticks: {
                                    color: '#9999b3',
                                    callback: function(value) {
                                        return '$' + value.toFixed(2);
                                    }
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#9999b3'
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                }
                            }
                        }
                    }
                });

                showNotification(`Fiyat trendi yüklendi: ${product.title.substring(0, 40)}...`, 'success');
            } catch (error) {
                console.error('Error loading price trend:', error);
                showNotification('Hata: ' + error.message, 'error');
            }
        }

        async function simulateScenario(scenario) {
            const scenarios = {
                peak: { name: 'Peak Hours', message: 'Akşam yoğunluğu simülasyonu başlatıldı' },
                lowstock: { name: 'Low Stock', message: 'Düşük stok simülasyonu başlatıldı' },
                discount: { name: 'Night Discount', message: 'Gece indirimi simülasyonu başlatıldı' }
            };

            showNotification(scenarios[scenario].message, 'success');
            
            if (scenario === 'lowstock') {
                const products = await fetch(`${API_BASE}/products?limit=20`).then(r => r.json());
                for (const product of products.data.slice(0, 10)) {
                    await fetch(`${API_BASE}/products/${product.id}/stock`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ stockLevel: 15 })
                    });
                }
            }
            
            setTimeout(() => loadProducts(), 1000);
        }

        async function resetPrices() {
            if (!confirm('Tüm ürünlerin fiyatlarını base fiyata sıfırlamak istiyor musunuz?')) return;
            
            showNotification('Fiyatlar sıfırlanıyor...', 'success');
            
            try {
                const products = await fetch(`${API_BASE}/products`).then(r => r.json());
                for (const product of products.data) {
                    await fetch(`${API_BASE}/products/${product.id}/stock`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ stockLevel: 100 })
                    });
                }
                showNotification('Fiyatlar sıfırlandı!', 'success');
                setTimeout(() => loadProducts(), 1000);
            } catch (error) {
                showNotification('Hata: ' + error.message, 'error');
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/pricing/analytics`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('totalProducts').textContent = data.totalProducts;
                    document.getElementById('avgPrice').textContent = '$' + data.averageCurrentPrice;
                    document.getElementById('categoryCount').textContent = Object.keys(data.byCategory).length;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/products/categories`);
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('categoryFilter');
                    result.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat;
                        option.textContent = cat;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadProductsForTrend() {
            try {
                const response = await fetch(`${API_BASE}/products?limit=50`);
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('trendProductSelect');
                    result.data.forEach(product => {
                        const option = document.createElement('option');
                        option.value = product.id;
                        option.textContent = `${product.title.substring(0, 60)}... ($${product.base_price})`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading products for trend:', error);
            }
        }

        async function loadStrategies() {
            try {
                const response = await fetch(`${API_BASE}/pricing/strategies`);
                const result = await response.json();
                
                if (result.success) {
                    const container = document.getElementById('strategies');
                    container.innerHTML = '<div class="strategy-list">' + 
                        result.data.strategies.map(s => `
                            <div class="strategy-item">
                                <div class="strategy-name">${s.name.toUpperCase()}</div>
                                <div class="strategy-desc">${s.description}</div>
                            </div>
                        `).join('') + '</div>';
                }
            } catch (error) {
                console.error('Error loading strategies:', error);
            }
        }

        async function loadProducts() {
            const category = document.getElementById('categoryFilter').value;
            const strategy = document.getElementById('strategySelect').value;
            const limit = document.getElementById('limitInput').value || 20;
            const productsDiv = document.getElementById('products');
            
            productsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Fiyatlar hesaplanıyor...</p></div>';
            
            document.getElementById('activeStrategy').textContent = strategy.charAt(0).toUpperCase() + strategy.slice(1);

            try {
                let url = `${API_BASE}/products?limit=${limit}`;
                if (category) url += `&category=${encodeURIComponent(category)}`;
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success && result.data.length > 0) {
                    const pricingPromises = result.data.map(product => 
                        fetch(`${API_BASE}/products/${product.id}/price?strategy=${strategy}`)
                            .then(r => r.json())
                    );
                    
                    const pricingResults = await Promise.all(pricingPromises);
                    
                    productsDiv.innerHTML = '<div class="product-grid">' + 
                        pricingResults.map(pr => {
                            if (!pr.success) return '';
                            const product = pr.data.product;
                            const pricing = pr.data.pricing;
                            const change = pricing.priceChangePercent || 0;
                            
                            return `
                                <div class="product-card">
                                    <div class="product-title">${product.title}</div>
                                    <div class="product-category">${product.category}</div>
                                    <div class="price-info">
                                        <div class="price">$${pricing.price}</div>
                                        ${change != 0 ? `<div class="price-change ${change > 0 ? 'price-up' : 'price-down'}">
                                            ${change > 0 ? '↑' : '↓'} ${Math.abs(change)}%
                                        </div>` : ''}
                                    </div>
                                    ${pricing.basePrice ? `<div class="product-details">Base: $${pricing.basePrice}</div>` : ''}
                                    ${pricing.factors ? `<div class="product-details" style="margin-top: 10px;">
                                        ${pricing.factors.map(f => {
                                            const change = (f.multiplier * 100 - 100).toFixed(1);
                                            const cls = change > 0 ? 'factor-positive' : change < 0 ? 'factor-negative' : '';
                                            return `<span class="factor-badge ${cls}">${f.strategy}: ${change > 0 ? '+' : ''}${change}%</span>`;
                                        }).join('')}
                                    </div>` : ''}
                                </div>
                            `;
                        }).join('') + '</div>';
                } else {
                    productsDiv.innerHTML = '<p class="loading">Ürün bulunamadı</p>';
                }
            } catch (error) {
                console.error('Error loading products:', error);
                productsDiv.innerHTML = '<p class="loading">Hata: ' + error.message + '</p>';
            }
        }

        async function updateAllPrices() {
            if (!confirm('Tüm ürün fiyatlarını güncellemek istediğinizden emin misiniz?')) return;
            
            const strategy = document.getElementById('strategySelect').value;
            const category = document.getElementById('categoryFilter').value;
            
            const productsDiv = document.getElementById('products');
            productsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Fiyatlar güncelleniyor...</p></div>';

            try {
                const body = { strategy };
                if (category) body.category = category;
                
                const response = await fetch(`${API_BASE}/pricing/update-all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const avgChange = result.data.reduce((sum, p) => sum + p.change, 0) / result.data.length;
                    showNotification(
                        `${result.count} ürün fiyatı güncellendi! Ortalama değişim: $${avgChange.toFixed(2)}`,
                        'success'
                    );
                    await loadProducts();
                    await loadStats();
                } else {
                    showNotification('Fiyat güncelleme başarısız!', 'error');
                }
            } catch (error) {
                console.error('Error updating prices:', error);
                showNotification('Hata: ' + error.message, 'error');
            }
        }

        loadStats();
        loadCategories();
        loadProductsForTrend();
        loadStrategies();
        loadProducts();
    </script>
</body>
</html>
