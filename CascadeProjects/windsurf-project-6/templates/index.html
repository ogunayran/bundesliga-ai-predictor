<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Lig İddia Botu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        .prediction-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .confidence-high {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .confidence-medium {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        .confidence-low {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .team-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .prediction-badge {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 25px;
        }
        .probability-bar {
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }
        .probability-fill {
            height: 100%;
            transition: width 0.5s ease;
        }
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .table-hover tbody tr:hover {
            background-color: rgba(102, 126, 234, 0.1);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .last-update {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-futbol text-primary"></i>
                Süper Lig İddia Botu
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text last-update" id="lastUpdate">
                    <i class="fas fa-clock"></i> Son güncelleme: Yükleniyor...
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card stats-card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-chart-line text-primary"></i>
                            İstatistikler
                        </h5>
                        <div class="row text-center">
                            <div class="col-md-3">
                                <h3 class="text-primary" id="totalPredictions">0</h3>
                                <p class="text-muted">Toplam Tahmin</p>
                            </div>
                            <div class="col-md-3">
                                <h3 class="text-success" id="highConfidence">0</h3>
                                <p class="text-muted">Yüksek Güven</p>
                            </div>
                            <div class="col-md-3">
                                <h3 class="text-warning" id="mediumConfidence">0</h3>
                                <p class="text-muted">Orta Güven</p>
                            </div>
                            <div class="col-md-3">
                                <h3 class="text-danger" id="lowConfidence">0</h3>
                                <p class="text-muted">Düşük Güven</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <h3 class="text-white mb-3">
                    <i class="fas fa-magic"></i>
                    Maç Tahminleri
                </h3>
                <div class="loading" id="predictionsLoading">
                    <div class="spinner"></div>
                    <p class="text-white mt-2">Tahminler yükleniyor...</p>
                </div>
                <div id="predictionsContainer"></div>
            </div>
            
            <div class="col-lg-4">
                <h3 class="text-white mb-3">
                    <i class="fas fa-trophy"></i>
                    Puan Durumu
                </h3>
                <div class="loading" id="standingsLoading">
                    <div class="spinner"></div>
                    <p class="text-white mt-2">Puan durumu yükleniyor...</p>
                </div>
                <div class="card stats-card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover" id="standingsTable">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Takım</th>
                                        <th>P</th>
                                        <th>OM</th>
                                    </tr>
                                </thead>
                                <tbody id="standingsBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let predictions = [];
        let standings = [];

        async function loadData() {
            document.getElementById('predictionsLoading').style.display = 'block';
            document.getElementById('standingsLoading').style.display = 'block';
            
            try {
                const [predictionsResponse, standingsResponse] = await Promise.all([
                    fetch('/api/predictions'),
                    fetch('/api/standings')
                ]);
                
                predictions = await predictionsResponse.json();
                standings = await standingsResponse.json();
                
                renderPredictions();
                renderStandings();
                updateStats();
                updateLastUpdateTime();
            } catch (error) {
                console.error('Veri yüklenirken hata:', error);
            } finally {
                document.getElementById('predictionsLoading').style.display = 'none';
                document.getElementById('standingsLoading').style.display = 'none';
            }
        }

        function renderPredictions() {
            const container = document.getElementById('predictionsContainer');
            container.innerHTML = '';
            
            if (predictions.length === 0) {
                container.innerHTML = `
                    <div class="card stats-card">
                        <div class="card-body text-center">
                            <i class="fas fa-info-circle text-muted fa-3x mb-3"></i>
                            <p class="text-muted">Henüz tahmin bulunmuyor.</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            predictions.forEach(pred => {
                const confidenceClass = getConfidenceClass(pred.confidence);
                const predictionCard = document.createElement('div');
                predictionCard.className = 'card mb-3 prediction-card ' + confidenceClass;
                
                predictionCard.innerHTML = `
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <div class="d-flex align-items-center">
                                    <div class="team-logo bg-white d-flex align-items-center justify-content-center me-3">
                                        <i class="fas fa-shield-alt text-primary"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-0">${pred.home_team}</h5>
                                        <small class="text-white-50">Ev Sahibi</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4 text-center">
                                <div class="prediction-badge bg-white text-dark">
                                    ${pred.prediction}
                                </div>
                                <div class="mt-2">
                                    <small class="text-white">Güven: ${(pred.confidence * 100).toFixed(1)}%</small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="d-flex align-items-center justify-content-end">
                                    <div class="text-end me-3">
                                        <h5 class="mb-0">${pred.away_team}</h5>
                                        <small class="text-white-50">Deplasman</small>
                                    </div>
                                    <div class="team-logo bg-white d-flex align-items-center justify-content-center">
                                        <i class="fas fa-shield-alt text-danger"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mt-3">
                            <div class="col-4">
                                <div class="text-center">
                                    <small class="text-white">Ev Sahibi</small>
                                    <div class="probability-bar mt-1">
                                        <div class="probability-fill bg-white" style="width: ${(pred.probabilities['Home Win'] * 100).toFixed(1)}%"></div>
                                    </div>
                                    <small class="text-white">${(pred.probabilities['Home Win'] * 100).toFixed(1)}%</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="text-center">
                                    <small class="text-white">Beraberlik</small>
                                    <div class="probability-bar mt-1">
                                        <div class="probability-fill bg-white" style="width: ${(pred.probabilities['Draw'] * 100).toFixed(1)}%"></div>
                                    </div>
                                    <small class="text-white">${(pred.probabilities['Draw'] * 100).toFixed(1)}%</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="text-center">
                                    <small class="text-white">Deplasman</small>
                                    <div class="probability-bar mt-1">
                                        <div class="probability-fill bg-white" style="width: ${(pred.probabilities['Away Win'] * 100).toFixed(1)}%"></div>
                                    </div>
                                    <small class="text-white">${(pred.probabilities['Away Win'] * 100).toFixed(1)}%</small>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-2 text-center">
                            <small class="text-white-50">
                                <i class="fas fa-calendar"></i> ${new Date(pred.match_date).toLocaleString('tr-TR')}
                            </small>
                        </div>
                    </div>
                `;
                
                container.appendChild(predictionCard);
            });
        }

        function renderStandings() {
            const tbody = document.getElementById('standingsBody');
            tbody.innerHTML = '';
            
            standings.slice(0, 10).forEach(team => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${team.position}</strong></td>
                    <td>${team.name}</td>
                    <td><strong>${team.points}</strong></td>
                    <td>${team.played}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats() {
            const totalPredictions = predictions.length;
            const highConfidence = predictions.filter(p => p.confidence >= 0.7).length;
            const mediumConfidence = predictions.filter(p => p.confidence >= 0.5 && p.confidence < 0.7).length;
            const lowConfidence = predictions.filter(p => p.confidence < 0.5).length;
            
            document.getElementById('totalPredictions').textContent = totalPredictions;
            document.getElementById('highConfidence').textContent = highConfidence;
            document.getElementById('mediumConfidence').textContent = mediumConfidence;
            document.getElementById('lowConfidence').textContent = lowConfidence;
        }

        function updateLastUpdateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').innerHTML = `
                <i class="fas fa-clock"></i> Son güncelleme: ${now.toLocaleTimeString('tr-TR')}
            `;
        }

        function getConfidenceClass(confidence) {
            if (confidence >= 0.7) return 'confidence-high';
            if (confidence >= 0.5) return 'confidence-medium';
            return 'confidence-low';
        }

        // Sayfa yüklendiğinde verileri getir
        document.addEventListener('DOMContentLoaded', loadData);
        
        // Her 5 dakikada bir verileri güncelle
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
